apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: taskapp
type: Opaque
# Values are base64 encoded:
# echo -n "postgres"  | base64  → cG9zdGdyZXM=
# echo -n "password"  | base64  → cGFzc3dvcmQ=
# echo -n "appdb"     | base64  → YXBwZGI=
data:
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: cGFzc3dvcmQ=
  POSTGRES_DB: YXBwZGI=
